<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>claude-control</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <!-- Markdown rendering: marked + DOMPurify (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
</head>
<body>
  <header class="masthead">
    <div class="brand">
      <span class="dot"></span>
      <h1>claude<span class="slash">/</span>control</h1>
    </div>
    <div class="meta">
      <code>{{ claude_home }}</code>
    </div>
  </header>

  <section class="stats" id="stats"></section>

  <nav class="tabs" id="tabs">
    <button data-kind="skills" class="active">Skills</button>
    <button data-kind="plugins">Plugins</button>
    <button data-kind="agents">Agents</button>
    <button data-kind="commands">Commands</button>
  </nav>

  <section class="actions">
    <input type="search" id="filter" placeholder="filter by name, description, or tag…" />
    <div class="action-buttons">
      <label class="btn ghost">
        <input type="file" id="zip-upload" accept=".zip" hidden />
        upload .zip
      </label>
      <button class="btn ghost" id="clone-btn">git clone…</button>
      <button class="btn ghost" id="bulk-btn">bulk import…</button>
    </div>
  </section>

  <div class="layout">
    <aside class="sidebar">
      <h4>Tags</h4>
      <div id="tag-list"></div>
    </aside>
    <main id="grid" class="grid"></main>
  </div>

  <footer class="footer">
    <span>local only · 127.0.0.1 · no telemetry</span>
  </footer>

  <!-- Preview modal -->
  <div class="modal" id="preview-modal" hidden>
    <div class="modal-card wide">
      <header class="modal-header">
        <h3 id="preview-title">Preview</h3>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn ghost" id="preview-edit">edit</button>
          <button class="btn ghost" id="preview-close">close</button>
        </div>
      </header>
      <div class="modal-body preview-body">
        <p class="preview-desc" id="preview-desc"></p>
        <div id="preview-tags" class="card-tags"></div>
        <div id="preview-path" class="card-path"></div>
        <article id="preview-content" class="markdown"></article>
        <details class="preview-files" id="preview-files-wrap" hidden>
          <summary>Files in this skill</summary>
          <div id="preview-files"></div>
        </details>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal" id="edit-modal" hidden>
    <div class="modal-card">
      <header class="modal-header">
        <h3 id="edit-title">Edit</h3>
        <button class="btn ghost" id="edit-close">close</button>
      </header>
      <div class="modal-body">
        <label>Name</label>
        <input id="edit-name" type="text" />
        <label>Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
        <label>Tags <span class="hint">(comma-separated)</span></label>
        <input id="edit-tags" type="text" placeholder="bioinformatics, clinical" />
        <label>Body <span class="hint">(markdown)</span></label>
        <textarea id="edit-body" rows="18"></textarea>
        <div class="modal-actions">
          <button class="btn" id="edit-validate">validate</button>
          <button class="btn primary" id="edit-save">save</button>
        </div>
        <div id="edit-issues"></div>
      </div>
    </div>
  </div>

  <!-- Bulk import modal -->
  <div class="modal" id="bulk-modal" hidden>
    <div class="modal-card narrow">
      <header class="modal-header">
        <h3>Bulk import from repo</h3>
        <button class="btn ghost" id="bulk-close">close</button>
      </header>
      <div class="modal-body">
        <p class="hint">Clones a marketplace repo and imports each top-level folder under <em>subdir</em> as a separate asset.</p>
        <label>Git URL</label>
        <input id="bulk-url" type="text" placeholder="https://github.com/anthropics/skills.git" />
        <label>Subdir <span class="hint">(optional)</span></label>
        <input id="bulk-subdir" type="text" placeholder="skills" />
        <div class="modal-actions">
          <button class="btn primary" id="bulk-go">import</button>
        </div>
        <div id="bulk-result"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
