name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    attributes:
      label: OS / Python version
      placeholder: "Ubuntu 24.04 / Python 3.11"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Console output
      description: Anything from the uvicorn / browser console
      render: shell
